<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pronoun Shooter · ESL Games</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #050518;
      display: flex; flex-direction: column; align-items: center;
      min-height: 100vh; font-family: 'Segoe UI', sans-serif; user-select: none;
    }
    .top-bar {
      width: 100%; max-width: 860px;
      display: flex; justify-content: space-between; align-items: center;
      padding: 12px 16px;
    }
    .back-btn { color: #4fc3f7; text-decoration: none; font-size: .9em; opacity: .7; }
    .back-btn:hover { opacity: 1; }
    .title { color: #e0e8ff; font-size: 1.1em; font-weight: bold; }
    canvas { display: block; max-width: 860px; width: 100%;
      border-radius: 12px; cursor: none; border: 1px solid rgba(79,195,247,.2); }
    .hint {
      max-width: 860px; width: 100%; padding: 10px 16px;
      color: #64748b; font-size: .82em; text-align: center;
    }
  </style>
</head>
<body>
<div class="top-bar">
  <a href="../../" class="back-btn">← Back to games</a>
  <span class="title">💦 Pronoun Shooter</span>
  <span></span>
</div>
<canvas id="c"></canvas>
<p class="hint">Shoot the correct pronoun target with your water gun!</p>

<script>
// ╔══════════════════════════════════════════════════════════════════════╗
// ║                  PRONOUN SHOOTER — CONFIGURATION                    ║
// ║                                                                      ║
// ║  1. Put all your photos inside the  images/  folder.                ║
// ║  2. Name them:  he_1.jpg  he_2.jpg  she_1.jpg  they_1.jpg  etc.    ║
// ║     For pronoun "I" use lowercase:  i_1.jpg  i_2.jpg               ║
// ║  3. Change the numbers below to match how many photos you have.     ║
// ║     Set 0 for any pronoun you don't have photos for.                ║
// ║                                                                      ║
// ║  IMAGE_EXT: change to '.png' if your photos are PNG files.         ║
// ╚══════════════════════════════════════════════════════════════════════╝

const IMAGE_EXT = '.jpg'; // ← change to '.png' if needed

const IMAGE_COUNTS = {
  //  pronoun  :  number of photos you have
  'I'    :  0,   // expects i_1.jpg, i_2.jpg, ...
  'you'  :  0,   // expects you_1.jpg, you_2.jpg, ...
  'he'   :  3,   // expects he_1.jpg, he_2.jpg, he_3.jpg
  'she'  :  3,   // expects she_1.jpg, she_2.jpg, she_3.jpg
  'it'   :  2,   // expects it_1.jpg, it_2.jpg, ...
  'we'   :  0,   // expects we_1.jpg, we_2.jpg, ...
  'they' :  3,   // expects they_1.jpg, they_2.jpg, they_3.jpg
};

// Sentences used for each pronoun — the game picks a different one per photo.
// You can add more sentences to any list if you want more variety.
const SENTENCES = {
  'I'   : ['_____ am very happy today.',      '_____ love studying English!',      '_____ am your teacher.'],
  'you' : ['Can _____ help me, please?',      '_____ are doing a great job!',      '_____ look great today.'],
  'he'  : ['_____ is in this photo.',         '_____ loves his hobby.',            '_____ is very talented.',   '_____ works very hard.'],
  'she' : ['_____ is in this photo.',         '_____ loves her hobby.',            '_____ is very talented.',   '_____ works very hard.'],
  'it'  : ['_____ is very interesting.',      '_____ looks amazing.',              '_____ is beautiful.',       '_____ is really fun!'],
  'we'  : ['_____ are all here!',             '_____ enjoy working together.',     '_____ are a great group.'],
  'they': ['_____ are in this photo.',        '_____ look very happy.',            '_____ are great friends.',  '_____ work well together.'],
};

// Emoji fallback — shown when IMAGE_COUNTS is 0 for a pronoun.
const FALLBACK_EMOJI = { 'I':'🙋','you':'🎓','he':'👦','she':'👩','it':'🌟','we':'👥','they':'👫' };

// ════════════════════════════════════════════════════════════════════════

const PRONOUNS   = ['I','you','he','she','it','we','they'];
const P_COLORS   = {
  'I':'#7c3aed','you':'#0369a1','he':'#065f46',
  'she':'#be185d','it':'#b45309','we':'#1e40af','they':'#6d28d9'
};

const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');
const W = canvas.width  = 860;
const H = canvas.height = 560;

// ─── Build question list from config ─────────────────────────────
function buildQuestions() {
  const qs = [];
  for (const pronoun of PRONOUNS) {
    const count = IMAGE_COUNTS[pronoun] ?? 0;
    const sents = SENTENCES[pronoun] ?? ['_____ is in this photo.'];
    if (count > 0) {
      for (let i = 1; i <= count; i++) {
        const prefix = pronoun === 'I' ? 'i' : pronoun;
        qs.push({
          image   : `images/${prefix}_${i}${IMAGE_EXT}`,
          sentence: sents[(i - 1) % sents.length],
          answer  : pronoun,
          _img    : null,
        });
      }
    } else {
      // No photos → add one emoji-based question per pronoun
      qs.push({
        image   : null,
        emoji   : FALLBACK_EMOJI[pronoun],
        sentence: sents[0],
        answer  : pronoun,
        _img    : null,
      });
    }
  }
  // Shuffle
  for (let i = qs.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [qs[i], qs[j]] = [qs[j], qs[i]];
  }
  return qs;
}

// ─── Image preloading ─────────────────────────────────────────────
async function preload(questions) {
  for (const q of questions) {
    if (!q.image) continue;
    q._img = await new Promise(res => {
      const img = new Image();
      img.onload  = () => res(img);
      img.onerror = () => res(null);   // graceful: falls back to emoji
      img.src = q.image;
    });
  }
}

// ─── Game state ───────────────────────────────────────────────────
let QUESTIONS = [];
let score = 0, lives = 3, qIdx = 0;
let gstate = 'loading'; // loading | playing | feedback | gameover | win
let targets = [], drops = [], floaters = [], streams = [];
let mouseX = W/2, mouseY = H/2;
let feedbackMsg = '', feedbackColor = '#fff', feedbackTimer = 0;
let highlightCorrect = '';

// ─── Target ───────────────────────────────────────────────────────
class Target {
  constructor(pronoun, idx, total) {
    this.pronoun = pronoun;
    this.color   = P_COLORS[pronoun];
    const gap    = W / (total + 1);
    this.pivotX  = gap * (idx + 1);
    this.pivotY  = 18;
    this.ropeLen = 68 + (idx % 3) * 18;
    this.angle   = (Math.random() - 0.5) * 0.4;
    this.av      = (Math.random() - 0.5) * 0.006;
    this.w = 78; this.h = 48;
    this.splashT = 0; this.splashOk = false;
  }
  get cx() { return this.pivotX + Math.sin(this.angle) * this.ropeLen; }
  get cy() { return this.pivotY + Math.cos(this.angle) * this.ropeLen; }
  update() {
    this.av += -0.003 * Math.sin(this.angle);
    this.av *= 0.998; this.angle += this.av;
    if (this.splashT > 0) this.splashT--;
  }
  contains(mx, my) {
    return mx > this.cx - this.w/2 && mx < this.cx + this.w/2 &&
           my > this.cy - this.h/2 && my < this.cy + this.h/2;
  }
  hitAnim(ok) { this.splashT = 55; this.splashOk = ok; if (!ok) this.av += (Math.random()-.5)*0.18; }
  draw() {
    const { cx, cy } = this;
    // Rope
    ctx.strokeStyle = '#7c5c2a'; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.moveTo(this.pivotX, this.pivotY); ctx.lineTo(cx, cy); ctx.stroke();
    // Nail
    ctx.fillStyle = '#bbb';
    ctx.beginPath(); ctx.arc(this.pivotX, this.pivotY, 5, 0, Math.PI*2); ctx.fill();

    ctx.save(); ctx.translate(cx, cy);

    // Splash ring
    if (this.splashT > 0) {
      ctx.globalAlpha = (this.splashT / 55) * 0.55;
      ctx.fillStyle = this.splashOk ? '#3b82f6' : '#ef4444';
      ctx.beginPath(); ctx.arc(0, 0, 46, 0, Math.PI*2); ctx.fill();
      ctx.globalAlpha = 1;
    }

    // Shadow
    ctx.fillStyle = 'rgba(0,0,0,0.3)';
    ctx.fillRect(-this.w/2+4, -this.h/2+4, this.w, this.h);

    // Board
    const lit  = this.splashT > 0 ? (this.splashOk ? '#bfdbfe' : '#fecaca') : '#fffbeb';
    const bord = this.splashT > 0 ? (this.splashOk ? '#2563eb' : '#dc2626') : this.color;
    ctx.fillStyle = lit;
    ctx.strokeStyle = bord; ctx.lineWidth = 2.5;
    ctx.beginPath(); ctx.roundRect(-this.w/2, -this.h/2, this.w, this.h, 8); ctx.fill(); ctx.stroke();

    // Color stripe
    ctx.fillStyle = this.color;
    ctx.beginPath(); ctx.roundRect(-this.w/2, -this.h/2, this.w, 9, [8,8,0,0]); ctx.fill();

    // Pronoun label
    ctx.fillStyle = '#1e1e4e';
    ctx.font = 'bold 20px Segoe UI'; ctx.textAlign = 'center';
    ctx.fillText(this.pronoun, 0, 13);

    // Glow outline if this is the correct answer shown as hint
    if (highlightCorrect && this.pronoun.toLowerCase() === highlightCorrect.toLowerCase()) {
      ctx.strokeStyle = '#34d399'; ctx.lineWidth = 3;
      ctx.setLineDash([5,3]);
      ctx.strokeRect(-this.w/2 - 4, -this.h/2 - 4, this.w + 8, this.h + 8);
      ctx.setLineDash([]);
    }

    ctx.restore();
  }
}

// ─── Water stream ─────────────────────────────────────────────────
class Stream {
  constructor(sx, sy, tx, ty) {
    this.sx=sx; this.sy=sy; this.tx=tx; this.ty=ty; this.p=0; this.done=false;
  }
  update() { this.p += 0.1; if (this.p >= 1.1) this.done = true; }
  draw() {
    for (let i = 0; i < 8; i++) {
      const t = Math.max(0, Math.min(1, this.p - i/8));
      if (t <= 0) continue;
      ctx.globalAlpha = (1 - i/8) * 0.9;
      ctx.fillStyle = '#60a5fa';
      ctx.beginPath();
      ctx.arc(
        this.sx + (this.tx - this.sx) * t,
        this.sy + (this.ty - this.sy) * t,
        5 * (1 - i/10), 0, Math.PI*2
      );
      ctx.fill();
    }
    ctx.globalAlpha = 1;
  }
}

// ─── Helpers ──────────────────────────────────────────────────────
function spawnDrops(x, y, ok, n=22) {
  const col = ok ? '#60a5fa' : '#f87171';
  for (let i = 0; i < n; i++) {
    const a = Math.random()*Math.PI*2, spd = 2+Math.random()*7;
    drops.push({ x, y, vx:Math.cos(a)*spd, vy:Math.sin(a)*spd-2.5, life:1, col, sz:2+Math.random()*5 });
  }
}
function spawnFloater(x, y, text, color) { floaters.push({ x, y, text, color, life:1, vy:-1.4 }); }

// ─── Init ─────────────────────────────────────────────────────────
async function init() {
  gstate = 'loading';
  QUESTIONS = buildQuestions();
  await preload(QUESTIONS);
  targets = PRONOUNS.map((p, i) => new Target(p, i, PRONOUNS.length));
  score = 0; lives = 3; qIdx = 0;
  drops = []; floaters = []; streams = []; feedbackTimer = 0; highlightCorrect = '';
  gstate = 'playing';
}

// ─── Shoot ────────────────────────────────────────────────────────
function shoot(mx, my) {
  if (gstate !== 'playing') return;
  const q = QUESTIONS[qIdx];

  let hit = null;
  for (const t of targets) { if (t.contains(mx, my)) { hit = t; break; } }
  if (!hit) { spawnDrops(mx, my, false, 10); return; }

  streams.push(new Stream(mx, my, hit.cx, hit.cy));

  setTimeout(() => {
    const ok = hit.pronoun.toLowerCase() === q.answer.toLowerCase();
    hit.hitAnim(ok);
    spawnDrops(hit.cx, hit.cy, ok, ok ? 28 : 16);

    if (ok) {
      score += 10;
      spawnFloater(hit.cx, hit.cy - 52, '+10', '#34d399');
      feedbackMsg   = '✓ Correct!';
      feedbackColor = '#34d399';
      feedbackTimer = 75;
      highlightCorrect = '';
      gstate = 'feedback';
      setTimeout(() => {
        qIdx++;
        gstate = qIdx >= QUESTIONS.length ? 'win' : 'playing';
      }, 950);
    } else {
      lives--;
      feedbackMsg   = `✗  "${q.answer.toUpperCase()}" was correct`;
      feedbackColor = '#f87171';
      feedbackTimer = 115;
      highlightCorrect = q.answer;
      if (lives <= 0) { gstate = 'gameover'; return; }
      gstate = 'feedback';
      setTimeout(() => {
        if (gstate === 'feedback') {
          highlightCorrect = '';
          qIdx++;
          gstate = qIdx >= QUESTIONS.length ? 'win' : 'playing';
        }
      }, 1500);
    }
  }, 560);
}

// ─── Drawing ──────────────────────────────────────────────────────
function drawBG() {
  const g = ctx.createLinearGradient(0,0,0,H);
  g.addColorStop(0,'#06061a'); g.addColorStop(1,'#0d0d2e');
  ctx.fillStyle = g; ctx.fillRect(0,0,W,H);
  ctx.fillStyle='rgba(255,255,255,.4)';
  [[60,22],[195,38],[345,15],[510,32],[665,19],[800,36],[130,62],[440,52],[730,58]].forEach(([sx,sy])=>{
    ctx.beginPath(); ctx.arc(sx,sy,1.5,0,Math.PI*2); ctx.fill();
  });
  ctx.fillStyle='#4a2e0a'; ctx.fillRect(0,0,W,18);
  ctx.fillStyle='#7c4f1c'; ctx.fillRect(0,14,W,5);
  // Divider between targets and image area
  ctx.strokeStyle='rgba(79,195,247,0.1)'; ctx.lineWidth=1;
  ctx.beginPath(); ctx.moveTo(0,165); ctx.lineTo(W,165); ctx.stroke();
}

function drawImageArea() {
  const q = QUESTIONS[qIdx];
  if (!q) return;

  const iw=230, ih=180, ix=W/2-iw/2, iy=178;

  // Frame shadow
  ctx.fillStyle='rgba(0,0,0,.45)';
  ctx.beginPath(); ctx.roundRect(ix+5,iy+5,iw,ih,14); ctx.fill();

  // Frame border
  ctx.strokeStyle='#3b82f6'; ctx.lineWidth=3;
  ctx.fillStyle='#0f172a';
  ctx.beginPath(); ctx.roundRect(ix,iy,iw,ih,14); ctx.fill(); ctx.stroke();

  if (q._img) {
    // Photo
    ctx.save();
    ctx.beginPath(); ctx.roundRect(ix,iy,iw,ih,11); ctx.clip();
    ctx.drawImage(q._img, ix, iy, iw, ih);
    // Slight vignette
    const v=ctx.createRadialGradient(W/2,iy+ih/2,ih*.18,W/2,iy+ih/2,ih*.75);
    v.addColorStop(0,'rgba(0,0,0,0)'); v.addColorStop(1,'rgba(0,0,0,.3)');
    ctx.fillStyle=v; ctx.fillRect(ix,iy,iw,ih);
    ctx.restore();
  } else {
    // Emoji fallback
    const bg=ctx.createLinearGradient(ix,iy,ix+iw,iy+ih);
    bg.addColorStop(0,'#1e293b'); bg.addColorStop(1,'#0f172a');
    ctx.fillStyle=bg;
    ctx.save(); ctx.beginPath(); ctx.roundRect(ix,iy,iw,ih,11); ctx.clip();
    ctx.fillRect(ix,iy,iw,ih);
    ctx.font='78px serif'; ctx.textAlign='center';
    ctx.fillText(q.emoji||'👤', W/2, iy+ih*.65);
    ctx.restore();
  }

  // Sentence
  ctx.fillStyle='#f1f5f9';
  ctx.font='bold 19px Segoe UI'; ctx.textAlign='center';
  // Auto-shrink long sentences
  const mw = W - 80;
  if (ctx.measureText(q.sentence).width > mw) ctx.font='bold 16px Segoe UI';
  ctx.fillText(q.sentence, W/2, iy+ih+36);

  // Instruction
  ctx.fillStyle='#4fc3f7'; ctx.font='13px Segoe UI';
  ctx.fillText('👆  Shoot the correct pronoun!', W/2, iy+ih+60);
}

function drawHUD() {
  ctx.fillStyle='#fbbf24'; ctx.font='bold 17px Segoe UI'; ctx.textAlign='left';
  ctx.fillText(`Score: ${score}`, 18, H-14);
  ctx.fillStyle='#64748b'; ctx.font='13px Segoe UI'; ctx.textAlign='center';
  ctx.fillText(`${qIdx+1} / ${QUESTIONS.length}`, W/2, H-14);
  ctx.font='17px serif'; ctx.textAlign='right';
  let h=''; for(let i=0;i<3;i++) h+=i<lives?'❤️ ':'🖤 ';
  ctx.fillText(h.trim(), W-18, H-14);

  if (feedbackTimer > 0) {
    ctx.globalAlpha = Math.min(1, feedbackTimer/30);
    ctx.fillStyle=feedbackColor; ctx.font='bold 26px Segoe UI'; ctx.textAlign='center';
    ctx.fillText(feedbackMsg, W/2, H/2+20);
    ctx.globalAlpha=1; feedbackTimer--;
  }
}

function drawCrosshair() {
  if (gstate==='gameover'||gstate==='win') return;
  const x=mouseX, y=mouseY;
  ctx.strokeStyle='#38bdf8'; ctx.lineWidth=2;
  ctx.beginPath(); ctx.arc(x,y,18,0,Math.PI*2); ctx.stroke();
  [[x-30,y,x-22,y],[x+22,y,x+30,y],[x,y-30,x,y-22],[x,y+22,x,y+30]].forEach(([x1,y1,x2,y2])=>{
    ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2); ctx.stroke();
  });
  ctx.fillStyle='#60a5fa'; ctx.globalAlpha=.7;
  [[-5,-5],[6,4],[4,-6]].forEach(([dx,dy])=>{
    ctx.beginPath(); ctx.arc(x+dx,y+dy,2,0,Math.PI*2); ctx.fill();
  });
  ctx.globalAlpha=1;
}

function drawOverlay() {
  if (gstate==='loading') {
    ctx.fillStyle='rgba(0,0,10,.92)'; ctx.fillRect(0,0,W,H);
    ctx.fillStyle='#4fc3f7'; ctx.font='22px Segoe UI'; ctx.textAlign='center';
    ctx.fillText('Loading images…', W/2, H/2);
    return;
  }
  if (gstate!=='gameover'&&gstate!=='win') return;
  ctx.fillStyle='rgba(0,0,10,.82)'; ctx.fillRect(0,0,W,H);
  ctx.textAlign='center';
  if (gstate==='win') {
    ctx.fillStyle='#34d399'; ctx.font='bold 50px Segoe UI';
    ctx.fillText('🎉 Excellent! 🎉', W/2, H/2-55);
    ctx.fillStyle='#f1f5f9'; ctx.font='26px Segoe UI';
    ctx.fillText(`Score: ${score} / ${QUESTIONS.length*10}`, W/2, H/2);
  } else {
    ctx.fillStyle='#f87171'; ctx.font='bold 48px Segoe UI';
    ctx.fillText('Game Over 😢', W/2, H/2-55);
    ctx.fillStyle='#f1f5f9'; ctx.font='26px Segoe UI';
    ctx.fillText(`Score: ${score}`, W/2, H/2);
  }
  ctx.fillStyle='#2563eb';
  ctx.beginPath(); ctx.roundRect(W/2-110,H/2+42,220,52,10); ctx.fill();
  ctx.fillStyle='#fff'; ctx.font='bold 20px Segoe UI';
  ctx.fillText('▶ Play Again', W/2, H/2+74);
}

// ─── Game loop ────────────────────────────────────────────────────
function loop() {
  ctx.clearRect(0,0,W,H);
  drawBG();
  for (const t of targets) { t.update(); t.draw(); }

  streams = streams.filter(s=>!s.done);
  for (const s of streams) { s.update(); s.draw(); }

  drops = drops.filter(d=>d.life>0);
  for (const d of drops) {
    d.x+=d.vx; d.y+=d.vy; d.vy+=.22; d.life-=.032;
    ctx.globalAlpha=d.life; ctx.fillStyle=d.col;
    ctx.beginPath(); ctx.arc(d.x,d.y,d.sz*d.life,0,Math.PI*2); ctx.fill();
  }
  ctx.globalAlpha=1;

  floaters=floaters.filter(f=>f.life>0);
  for (const f of floaters) {
    f.y+=f.vy; f.life-=.024;
    ctx.globalAlpha=f.life; ctx.fillStyle=f.color;
    ctx.font='bold 15px Segoe UI'; ctx.textAlign='center';
    ctx.fillText(f.text, f.x, f.y);
  }
  ctx.globalAlpha=1;

  if (gstate!=='gameover'&&gstate!=='win'&&gstate!=='loading') {
    drawImageArea(); drawHUD(); drawCrosshair();
  }
  drawOverlay();
  requestAnimationFrame(loop);
}

// ─── Events ───────────────────────────────────────────────────────
canvas.addEventListener('mousemove', e=>{
  const r=canvas.getBoundingClientRect();
  mouseX=(e.clientX-r.left)*(W/r.width);
  mouseY=(e.clientY-r.top)*(H/r.height);
});
canvas.addEventListener('click', e=>{
  const r=canvas.getBoundingClientRect();
  const mx=(e.clientX-r.left)*(W/r.width), my=(e.clientY-r.top)*(H/r.height);
  if (gstate==='gameover'||gstate==='win') {
    if (mx>W/2-110&&mx<W/2+110&&my>H/2+42&&my<H/2+94) init();
    return;
  }
  shoot(mx,my);
});
canvas.addEventListener('touchstart', e=>{
  e.preventDefault();
  const r=canvas.getBoundingClientRect(), t=e.touches[0];
  const mx=(t.clientX-r.left)*(W/r.width), my=(t.clientY-r.top)*(H/r.height);
  mouseX=mx; mouseY=my;
  if (gstate==='gameover'||gstate==='win') {
    if (mx>W/2-110&&mx<W/2+110&&my>H/2+42&&my<H/2+94) init();
    return;
  }
  shoot(mx,my);
},{passive:false});

loop();
init();
</script>
</body>
</html>
