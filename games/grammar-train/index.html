<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Grammar Express · ESL Games</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #030a1a;
      display: flex; flex-direction: column; align-items: center;
      min-height: 100vh; font-family: 'Segoe UI', sans-serif; user-select: none;
    }
    .top-bar {
      width: 100%; max-width: 900px;
      display: flex; justify-content: space-between; align-items: center;
      padding: 12px 16px;
    }
    .back-btn { color: #4fc3f7; text-decoration: none; font-size: .9em; opacity: .7; transition: opacity .2s; }
    .back-btn:hover { opacity: 1; }
    .title { color: #e0e8ff; font-size: 1.1em; font-weight: bold; }
    canvas {
      display: block; max-width: 900px; width: 100%;
      border-radius: 12px; border: 1px solid rgba(79,195,247,.2); cursor: pointer;
    }
    .instructions {
      max-width: 900px; width: 100%; padding: 10px 16px;
      color: #64748b; font-size: .82em; text-align: center;
    }
  </style>
</head>
<body>
<div class="top-bar">
  <a href="../../" class="back-btn">← Back to games</a>
  <span class="title">🚂 Grammar Express — Verb To Be</span>
  <span></span>
</div>
<canvas id="c"></canvas>
<p class="instructions">Click a floating verb to select it · Click the correct pronoun wagon · Score as many as you can!</p>

<script>
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');
const W = canvas.width  = 900;
const H = canvas.height = 580;

// ─── Grammar Data ─────────────────────────────────────────────────
//  verb → array of pronouns that correctly use it
const VERB_DATA = {
  'am':   { pronouns: ['I'],                        color: '#7c3aed', note: '"am" → only with I'                },
  'is':   { pronouns: ['he', 'she', 'it'],           color: '#0369a1', note: '"is" → he / she / it'             },
  'are':  { pronouns: ['you', 'we', 'they'],         color: '#065f46', note: '"are" → you / we / they'          },
  'was':  { pronouns: ['I', 'he', 'she', 'it'],      color: '#b45309', note: '"was" → I / he / she / it'        },
  'were': { pronouns: ['you', 'we', 'they'],         color: '#1e40af', note: '"were" → you / we / they'         },
  'be':   { pronouns: ['I','you','he','she','it','we','they'], color: '#4338ca',
            note: '"be" → after modal verbs: can/should/must/will BE — all pronouns!' },
  'has':  { pronouns: ['he', 'she', 'it'],           color: '#be185d', note: '"has" → he / she / it'            },
  'have': { pronouns: ['I', 'you', 'we', 'they'],    color: '#166534', note: '"have" → I / you / we / they'     },
};

const VERBS    = Object.keys(VERB_DATA);
const PRONOUNS = ['I', 'you', 'he', 'she', 'it', 'we', 'they'];

// Wagon colors per pronoun
const WAGON_COLORS = {
  'I': '#7c3aed', 'you': '#0369a1', 'he': '#065f46', 'she': '#be185d',
  'it': '#b45309', 'we': '#1e40af', 'they': '#6d28d9'
};

// ─── State ────────────────────────────────────────────────────────
let score = 0, lives = 3, matched = 0, totalAttempts = 0;
let state = 'playing';
let boxes = [], wagons = [];
let selectedBox = null;
let particles = [], floaters = [], flyAnim = null;
let lastHintNote = '';
let hintTimer = 0;
let verbQueue = [];

// ─── Wagon slot ───────────────────────────────────────────────────
class Wagon {
  constructor(pronoun, idx, total) {
    this.pronoun = pronoun;
    this.color   = WAGON_COLORS[pronoun];
    const avail  = W - 110; // leave room for locomotive
    this.w = Math.floor(avail / total) - 4;
    this.h = 72;
    this.x = 110 + idx * (this.w + 4) + this.w / 2;
    this.y = H - 110;
    this.bounce = 0;
    this.shake  = 0;
    this.matchCount = 0;
  }
  draw() {
    let dx = 0;
    if (this.shake > 0) { dx = Math.sin(this.shake * 2.2) * 4; this.shake--; }

    ctx.save();
    ctx.translate(this.x + dx, this.y);

    // Coupler
    ctx.fillStyle = '#78350f';
    ctx.fillRect(-this.w/2 - 5, -8, 8, 5);
    ctx.fillRect(this.w/2 - 3, -8, 8, 5);

    // Shadow
    ctx.fillStyle = 'rgba(0,0,0,0.3)';
    ctx.fillRect(-this.w/2 + 3, -this.h/2 + 3, this.w, this.h);

    // Body
    const bg = this.matchCount > 0
      ? lighten(this.color, 30)
      : '#1e293b';
    ctx.fillStyle = bg;
    ctx.strokeStyle = this.matchCount > 0 ? lighten(this.color, 80) : '#334155';
    ctx.lineWidth = 2;
    ctx.fillRect(-this.w/2, -this.h/2, this.w, this.h);
    ctx.strokeRect(-this.w/2, -this.h/2, this.w, this.h);

    // Color stripe on top
    ctx.fillStyle = this.color;
    ctx.fillRect(-this.w/2, -this.h/2, this.w, 8);

    // Wheels
    ctx.fillStyle = '#374151'; ctx.strokeStyle = '#6b7280'; ctx.lineWidth = 1.5;
    [this.w/2 - 14, -(this.w/2 - 14)].forEach(wx => {
      ctx.beginPath(); ctx.arc(wx, this.h/2 - 2, 10, 0, Math.PI*2); ctx.fill(); ctx.stroke();
      ctx.fillStyle = '#9ca3af'; ctx.beginPath(); ctx.arc(wx, this.h/2 - 2, 3, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = '#374151';
    });

    // Pronoun label
    ctx.fillStyle = '#fff';
    ctx.font = `bold ${Math.min(18, this.w * 0.22)}px Segoe UI`;
    ctx.textAlign = 'center';
    ctx.fillText(this.pronoun, 0, 6);

    // Match count badge
    if (this.matchCount > 0) {
      ctx.fillStyle = '#34d399';
      ctx.font = `bold 11px Segoe UI`;
      ctx.fillText('✓'.repeat(this.matchCount), 0, this.h/2 - 14);
    }

    // Highlight glow when box selected and this wagon is a correct answer
    if (selectedBox) {
      const vd = VERB_DATA[selectedBox.verb];
      if (vd && vd.pronouns.includes(this.pronoun)) {
        ctx.globalAlpha = 0.25 + 0.15 * Math.sin(Date.now() * 0.006);
        ctx.fillStyle = '#34d399';
        ctx.fillRect(-this.w/2, -this.h/2, this.w, this.h);
        ctx.globalAlpha = 1;
        ctx.strokeStyle = '#34d399'; ctx.lineWidth = 2.5;
        ctx.strokeRect(-this.w/2, -this.h/2, this.w, this.h);
      }
    }

    ctx.restore();
  }
  contains(mx, my) {
    return mx > this.x - this.w/2 && mx < this.x + this.w/2 &&
           my > this.y - this.h/2 && my < this.y + this.h/2;
  }
}

// ─── Floating verb box ────────────────────────────────────────────
class VerbBox {
  constructor(verb, idx) {
    this.verb     = verb;
    this.color    = VERB_DATA[verb].color;
    this.matched  = false;
    this.selected = false;
    this.w = 90; this.h = 58;
    // Distribute across upper area
    this.x = 80 + (idx % 4) * 200 + Math.random() * 60;
    this.y = 90  + Math.floor(idx / 4) * 110 + Math.random() * 40;
    this.vx = (Math.random() - 0.5) * 0.7;
    this.vy = (Math.random() - 0.5) * 0.5;
    this.bobPhase = Math.random() * Math.PI * 2;
  }
  update() {
    if (this.matched || flyAnim?.box === this) return;
    this.bobPhase += 0.022;
    this.x += this.vx;
    this.y += this.vy + Math.sin(this.bobPhase) * 0.28;
    const minY = 70, maxY = H - 215;
    if (this.x < this.w/2 + 8 || this.x > W - this.w/2 - 8) this.vx *= -1;
    if (this.y < minY || this.y > maxY) this.vy *= -1;
    this.x = Math.max(this.w/2+8, Math.min(W-this.w/2-8, this.x));
    this.y = Math.max(minY, Math.min(maxY, this.y));
  }
  contains(mx, my) {
    return !this.matched &&
      mx > this.x - this.w/2 && mx < this.x + this.w/2 &&
      my > this.y - this.h/2 && my < this.y + this.h/2;
  }
  draw() {
    if (this.matched) return;
    ctx.save();
    ctx.translate(this.x, this.y);

    if (this.selected) { ctx.shadowColor = this.color; ctx.shadowBlur = 20; }

    // Shadow
    ctx.fillStyle = 'rgba(0,0,0,0.35)';
    ctx.beginPath(); ctx.roundRect(-this.w/2+4, -this.h/2+4, this.w, this.h, 12); ctx.fill();

    // Body gradient
    const g = ctx.createLinearGradient(0, -this.h/2, 0, this.h/2);
    g.addColorStop(0, lighten(this.color, 55));
    g.addColorStop(1, this.color);
    ctx.fillStyle = g;
    ctx.strokeStyle = this.selected ? '#fff' : lighten(this.color, 90);
    ctx.lineWidth = this.selected ? 2.5 : 1.5;
    ctx.beginPath(); ctx.roundRect(-this.w/2, -this.h/2, this.w, this.h, 12); ctx.fill(); ctx.stroke();

    ctx.shadowBlur = 0;

    // Verb text
    ctx.fillStyle = '#fff';
    ctx.font = `bold ${this.verb.length > 4 ? 17 : 22}px Segoe UI`;
    ctx.textAlign = 'center';
    ctx.fillText(this.verb, 0, 7);

    // Spinning orbit dots when selected
    if (this.selected) {
      const t = Date.now() * 0.004;
      ctx.globalAlpha = 0.7;
      for (let i = 0; i < 5; i++) {
        const a = t + (i/5)*Math.PI*2;
        const rx = (this.w/2 + 10) * Math.cos(a);
        const ry = (this.h/2 + 8) * Math.sin(a);
        ctx.fillStyle = '#fff';
        ctx.beginPath(); ctx.arc(rx, ry, 3, 0, Math.PI*2); ctx.fill();
      }
      ctx.globalAlpha = 1;
    }

    ctx.restore();
  }
}

// ─── Helpers ──────────────────────────────────────────────────────
function lighten(hex, a) {
  let r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
  return `rgb(${Math.min(255,r+a)},${Math.min(255,g+a)},${Math.min(255,b+a)})`;
}
function spawnParticles(x, y, color, n) {
  for (let i = 0; i < n; i++) {
    const a = Math.random()*Math.PI*2, spd = 2+Math.random()*5;
    particles.push({ x, y, vx: Math.cos(a)*spd, vy: Math.sin(a)*spd-2, life:1, color, size:2+Math.random()*5 });
  }
}
function spawnFloater(x, y, text, color) {
  floaters.push({ x, y, text, color, life:1, vy:-1.3 });
}

// ─── Init ─────────────────────────────────────────────────────────
function init() {
  score = 0; lives = 3; matched = 0; totalAttempts = 0; state = 'playing';
  particles = []; floaters = []; flyAnim = null; selectedBox = null;
  lastHintNote = ''; hintTimer = 0;

  wagons = PRONOUNS.map((p, i) => new Wagon(p, i, PRONOUNS.length));

  // Show all 8 verbs at once
  verbQueue = [...VERBS].sort(() => Math.random()-0.5);
  boxes = verbQueue.map((v, i) => new VerbBox(v, i));
}

// ─── Click handling ───────────────────────────────────────────────
function handleClick(mx, my) {
  if (state !== 'playing') return;

  // Check boxes
  for (const b of boxes) {
    if (b.contains(mx, my)) {
      boxes.forEach(x => x.selected = false);
      b.selected = true; selectedBox = b; return;
    }
  }

  // Check wagons
  if (!selectedBox) return;
  for (const w of wagons) {
    if (w.contains(mx, my)) {
      tryMatch(selectedBox, w); return;
    }
  }

  // Deselect
  boxes.forEach(b => b.selected = false); selectedBox = null;
}

function tryMatch(box, wagon) {
  totalAttempts++;
  const vd = VERB_DATA[box.verb];
  const ok = vd.pronouns.includes(wagon.pronoun);

  if (ok) {
    score += 15;
    box.selected = false;
    flyAnim = {
      box, wagon,
      sx: box.x, sy: box.y,
      progress: 0
    };
    selectedBox = null;
    lastHintNote = vd.note;
    hintTimer = 180;
  } else {
    lives--;
    wagon.shake = 20;
    spawnParticles(wagon.x, wagon.y, '#f87171', 12);
    lastHintNote = vd.note;
    hintTimer = 200;
    spawnFloater(wagon.x, wagon.y - 55,
      `✗  "${box.verb}" → ${vd.pronouns.join(' / ')}`, '#f87171');
    box.selected = false; selectedBox = null;
    if (lives <= 0) { state = 'gameover'; return; }
  }
}

function completeFly() {
  const { box, wagon } = flyAnim;
  box.matched = true;
  wagon.matchCount++;
  wagon.bounce = 12;
  spawnParticles(wagon.x, wagon.y, wagon.color, 20);
  spawnFloater(wagon.x, wagon.y - 55, `+15  ✓`, '#34d399');
  matched++;
  flyAnim = null;
  if (boxes.every(b => b.matched)) {
    setTimeout(() => { state = 'win'; }, 700);
  }
}

// ─── Draw background ──────────────────────────────────────────────
function drawBG() {
  const g = ctx.createLinearGradient(0,0,0,H);
  g.addColorStop(0,'#03091a'); g.addColorStop(0.6,'#07142b'); g.addColorStop(1,'#0a1b1a');
  ctx.fillStyle = g; ctx.fillRect(0,0,W,H);

  // Stars
  ctx.fillStyle='rgba(255,255,255,0.4)';
  [[60,30],[200,15],[380,40],[530,12],[680,28],[820,18],[140,65],[460,58],[720,72]].forEach(([sx,sy])=>{
    ctx.beginPath(); ctx.arc(sx,sy,1.4,0,Math.PI*2); ctx.fill();
  });

  // Ground
  ctx.fillStyle = '#0f1a0f'; ctx.fillRect(0, H-48, W, 48);
  ctx.fillStyle = '#14532d'; ctx.fillRect(0, H-50, W, 5);

  // Rails
  ctx.strokeStyle='#78350f'; ctx.lineWidth=4;
  ctx.beginPath(); ctx.moveTo(0,H-28); ctx.lineTo(W,H-28); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(0,H-40); ctx.lineTo(W,H-40); ctx.stroke();
  // Sleepers
  ctx.fillStyle='#451a03';
  for (let x = 10; x < W; x += 38) ctx.fillRect(x, H-44, 12, 18);

  drawLocomotive();
}

function drawLocomotive() {
  const bx = 8, baseY = H - 48;
  ctx.save(); ctx.translate(bx, baseY);

  // Body
  ctx.fillStyle = '#dc2626';
  ctx.fillRect(0, -62, 90, 62);
  // Cab
  ctx.fillStyle = '#b91c1c';
  ctx.fillRect(6, -78, 70, 20);
  // Chimney
  ctx.fillStyle = '#7f1d1d';
  ctx.fillRect(68, -96, 16, 22);

  // Animated smoke
  ctx.fillStyle = 'rgba(180,180,180,0.18)';
  const t = Date.now() * 0.0012;
  [0,1,2].forEach(i => {
    const a = t + i*0.9;
    ctx.beginPath();
    ctx.arc(76 + Math.sin(a)*5, -100 - i*16 - (t*10)%22, 7+i*3, 0, Math.PI*2);
    ctx.fill();
  });

  // Window
  ctx.fillStyle = '#fef08a'; ctx.fillRect(14,-72,20,13);
  ctx.fillStyle = '#1e3a5f'; ctx.fillRect(16,-70,8,9);

  // Front lamp
  ctx.fillStyle = '#fef08a';
  ctx.beginPath(); ctx.arc(88, -38, 6, 0, Math.PI*2); ctx.fill();

  // Wheels
  ctx.fillStyle='#374151'; ctx.strokeStyle='#6b7280'; ctx.lineWidth=2;
  [20, 56].forEach(wx => {
    ctx.beginPath(); ctx.arc(wx,-4,14,0,Math.PI*2); ctx.fill(); ctx.stroke();
    ctx.fillStyle='#9ca3af'; ctx.beginPath(); ctx.arc(wx,-4,4,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#374151';
  });
  // Coupler
  ctx.fillStyle='#78350f'; ctx.fillRect(88,-18,8,6);
  ctx.restore();
}

// ─── Draw fly animation ───────────────────────────────────────────
function drawFly() {
  if (!flyAnim) return;
  flyAnim.progress = Math.min(1, flyAnim.progress + 0.05);
  const t = easeOut(flyAnim.progress);
  const { sx, sy, box, wagon } = flyAnim;
  const cx = sx + (wagon.x - sx) * t;
  const cy = sy + (wagon.y - sy) * t - Math.sin(flyAnim.progress * Math.PI) * 70;
  const alpha = flyAnim.progress > 0.8 ? 1 - (flyAnim.progress-0.8)/0.2 : 1;

  ctx.save(); ctx.globalAlpha = alpha; ctx.translate(cx, cy);
  const g = ctx.createLinearGradient(0,-29,0,29);
  g.addColorStop(0, lighten(box.color, 55)); g.addColorStop(1, box.color);
  ctx.fillStyle = g; ctx.strokeStyle='#fff'; ctx.lineWidth=2;
  ctx.beginPath(); ctx.roundRect(-45,-29,90,58,12); ctx.fill(); ctx.stroke();
  ctx.fillStyle='#fff'; ctx.font=`bold ${box.verb.length>4?17:22}px Segoe UI`;
  ctx.textAlign='center'; ctx.fillText(box.verb, 0, 7);
  ctx.restore();

  if (flyAnim.progress >= 1) completeFly();
}

function easeOut(t) { return 1 - Math.pow(1-t, 3); }

// ─── Draw HUD ─────────────────────────────────────────────────────
function drawHUD() {
  ctx.fillStyle='#fbbf24'; ctx.font='bold 17px Segoe UI'; ctx.textAlign='left';
  ctx.fillText(`Score: ${score}`, 16, 32);

  ctx.fillStyle='#64748b'; ctx.font='13px Segoe UI'; ctx.textAlign='center';
  ctx.fillText(`Matched: ${matched} / ${VERBS.length}`, W/2, 32);

  ctx.font='17px serif'; ctx.textAlign='right';
  let h=''; for(let i=0;i<3;i++) h += i<lives?'❤️ ':'🖤 ';
  ctx.fillText(h.trim(), W-16, 32);

  // Instruction / hint
  if (hintTimer > 0) {
    const isCorrect = lastHintNote && !floaters.some(f => f.text?.startsWith('✗'));
    ctx.globalAlpha = Math.min(1, hintTimer / 40);
    ctx.fillStyle = '#34d399';
    ctx.font = 'bold 14px Segoe UI'; ctx.textAlign = 'center';
    ctx.fillText('💡 ' + lastHintNote, W/2, 56);
    ctx.globalAlpha = 1;
    hintTimer--;
  } else if (selectedBox) {
    ctx.fillStyle = '#4fc3f7'; ctx.font = '13px Segoe UI'; ctx.textAlign='center';
    const vd = VERB_DATA[selectedBox.verb];
    ctx.fillText(`"${selectedBox.verb}" selected — click a correct pronoun wagon (highlighted in green)`, W/2, 56);
  } else {
    ctx.fillStyle='#334155'; ctx.font='12px Segoe UI'; ctx.textAlign='center';
    ctx.fillText('Click a verb box to select it, then click the correct pronoun wagon', W/2, 56);
  }
}

// ─── Draw overlay ─────────────────────────────────────────────────
function drawOverlay() {
  if (state !== 'gameover' && state !== 'win') return;
  ctx.fillStyle='rgba(0,0,10,0.82)'; ctx.fillRect(0,0,W,H);
  ctx.textAlign='center';
  if (state === 'win') {
    ctx.fillStyle='#34d399'; ctx.font='bold 46px Segoe UI';
    ctx.fillText('🎉 All aboard! Perfect! 🎉', W/2, H/2-55);
  } else {
    ctx.fillStyle='#f87171'; ctx.font='bold 46px Segoe UI';
    ctx.fillText('Game Over 😢', W/2, H/2-55);
  }
  ctx.fillStyle='#f1f5f9'; ctx.font='24px Segoe UI';
  ctx.fillText(`Score: ${score}   Matched: ${matched} / ${VERBS.length}`, W/2, H/2);

  ctx.fillStyle='#2563eb';
  ctx.beginPath(); ctx.roundRect(W/2-110,H/2+42,220,52,10); ctx.fill();
  ctx.fillStyle='#fff'; ctx.font='bold 20px Segoe UI';
  ctx.fillText('▶ Play Again', W/2, H/2+74);
}

// ─── Loop ─────────────────────────────────────────────────────────
function loop() {
  ctx.clearRect(0,0,W,H);
  drawBG();

  for (const b of boxes) { b.update(); b.draw(); }
  for (const w of wagons) { w.draw(); }

  drawFly();

  // Particles
  particles = particles.filter(p => p.life > 0);
  particles.forEach(p => { p.x+=p.vx; p.y+=p.vy; p.vy+=0.2; p.life-=0.03;
    ctx.globalAlpha=p.life; ctx.fillStyle=p.color;
    ctx.beginPath(); ctx.arc(p.x,p.y,p.size*p.life,0,Math.PI*2); ctx.fill();
  }); ctx.globalAlpha=1;

  // Floaters
  floaters = floaters.filter(f => f.life > 0);
  floaters.forEach(f => { f.y+=f.vy; f.life-=0.02;
    ctx.globalAlpha=f.life; ctx.fillStyle=f.color;
    ctx.font='bold 13px Segoe UI'; ctx.textAlign='center';
    ctx.fillText(f.text, f.x, f.y);
  }); ctx.globalAlpha=1;

  if (state !== 'gameover' && state !== 'win') drawHUD();
  drawOverlay();
  requestAnimationFrame(loop);
}

// ─── Events ───────────────────────────────────────────────────────
function getPos(e) {
  const r = canvas.getBoundingClientRect();
  return [(e.clientX-r.left)*(W/r.width), (e.clientY-r.top)*(H/r.height)];
}
canvas.addEventListener('click', e => {
  const [mx,my] = getPos(e);
  if (state==='gameover'||state==='win') {
    if (mx>W/2-110&&mx<W/2+110&&my>H/2+42&&my<H/2+94) init();
    return;
  }
  handleClick(mx,my);
});
canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  const r = canvas.getBoundingClientRect();
  const t = e.touches[0];
  const mx=(t.clientX-r.left)*(W/r.width), my=(t.clientY-r.top)*(H/r.height);
  if (state==='gameover'||state==='win') {
    if (mx>W/2-110&&mx<W/2+110&&my>H/2+42&&my<H/2+94) init();
    return;
  }
  handleClick(mx,my);
},{passive:false});
canvas.addEventListener('mousemove', e => {
  const [mx,my] = getPos(e);
  const overBox    = boxes.some(b => b.contains(mx,my));
  const overWagon  = selectedBox && wagons.some(w => w.contains(mx,my));
  canvas.style.cursor = overBox || overWagon ? 'pointer' : 'default';
});

init();
loop();
</script>
</body>
</html>
